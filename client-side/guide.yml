main.js:
  - main.js is the entry point of the server
  - It initializes the Express app and starts the backend
  - This file is responsible for running the website/server
  - File path: ./src/main/main.js
  - To run it from the project root: "nodemon src/main/main.js"
  - A run script (included inside package.json): "npm run client-server"

clientPath.js:
  - We create clientPath.js for global use
  - It provides the project’s base directory (__dirname)
  - Since this path is generated dynamically, it works on any system
  - We can import it anywhere and safely build paths without worrying about location issues

static folder:
  - public files that browser can access directly without backend logic
  - path: src/public

folderStructure:
  package-lock.json
  package.json
  clientPath.js
  src:
    controllers:
      .. backend logic for each page
    main:
      main.js // main server run file
    publicFolder:
      assets:
        fonts:
        icons:
        images:
      scripts:
        home.js
        login.js
        signup.js
        client-layouts.js  // navbar, footer, sidebar
        client-publicChat.js
        dashboard.js
      styles:
        fonts.css
        home.css
        login.css
        signup.css
        client-layouts.css  // navbar, footer, sidebar
        client-publicChat.css
        dashboard.css

    routes:
      homeRouts.js
    utils:
      components
      layouts
        client-navbar.ejs
        client-footer.ejs
        client-sidebar.ejs
        client-publicChat.ejs
    views:
      login.ejs
      home.ejs
      signup.ejs
      dashboard.ejs
    





